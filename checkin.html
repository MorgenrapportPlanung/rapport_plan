<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#181c27">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rapport Check-In">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Rapport Check-In</title>
  <style>
    :root {
      --bg:           #0f1117;
      --surface:      #181c27;
      --border:       #2a2f3d;
      --border-light: #3d4558;
      --text:         #e8eaf0;
      --muted:        #6b7280;
      --ua:           #60a5fa;
      --aa:           #34d399;
      --sf: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      --sf-mono: 'SF Mono', ui-monospace, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg); color: var(--text);
      font-family: var(--sf); font-size: 20px;
      min-height: 100dvh; display: flex; flex-direction: column;
      padding-top: env(safe-area-inset-top);
    }

    /* ── CLOCK ─────────────────────────────────────────── */
    #clock-bar {
      font-family: var(--sf); font-size: 1.6rem; font-weight: 600;
      color: var(--text); text-align: center;
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    /* ── TABS ──────────────────────────────────────────── */
    .tab-bar {
      display: flex; background: var(--surface);
      border-bottom: 2px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .tab-btn {
      flex: 1; padding: 1.1rem; background: none; border: none;
      color: var(--muted); font-family: var(--sf);
      font-size: 1rem; letter-spacing: .02em;
      cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: all .2s;
    }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--text); }

    /* ── PAGES ─────────────────────────────────────────── */
    .page { display: none; }
    .page.active { display: flex; flex-direction: column; }

    /* ── CHECK-IN ──────────────────────────────────────── */
    #page-checkin { align-items: center; padding: 2rem 1rem 5rem; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.8rem;
      width: 100%; max-width: 560px; margin-bottom: 1.2rem;
    }
    #card-loc { border-color: var(--border-light); }

    .card-title {
      font-family: var(--sf); font-size: 1.3rem; font-weight: 500;
      color: var(--muted); margin-bottom: 1.1rem;
    }

    input[type="text"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: var(--sf);
      font-size: 1.3rem; padding: .8rem 1.1rem; outline: none; transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: var(--ua); }
    input[type="text"]::placeholder { color: var(--muted); }

    .role-grid { display: flex; gap: .8rem; }
    .role-btn {
      flex: 1; padding: 1.1rem; border-radius: 12px;
      border: 2px solid var(--border); background: var(--bg);
      color: var(--muted); font-family: var(--sf);
      font-size: 1.3rem; font-weight: 600; cursor: pointer; transition: all .18s;
    }
    .role-btn.sel-ua { border-color: var(--ua); color: var(--ua); background: #0d1f38; }
    .role-btn.sel-aa { border-color: var(--aa); color: var(--aa); background: #0f2a1e; }

    .loc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .65rem; }
    .loc-btn {
      padding: 1rem .6rem; border-radius: 12px;
      border: 2px solid var(--border); background: var(--bg);
      color: var(--muted); font-family: var(--sf);
      font-size: 1.3rem; font-weight: 500; cursor: pointer; transition: all .18s; text-align: center;
    }
    .loc-btn.sel-ua { border-color: var(--ua); color: var(--ua); background: #0d1f38; }
    .loc-btn.sel-aa { border-color: var(--aa); color: var(--aa); background: #0f2a1e; }
    .loc-btn.before-divider { margin-bottom: 1rem; }
    .loc-btn.after-divider  { margin-top: 1rem; }
    .loc-divider { grid-column: 1 / -1; height: 1px; background: var(--border-light); }

    #submit-btn {
      width: 100%; max-width: 560px; padding: 1.2rem;
      border-radius: 12px; border: none; background: #1e293b;
      color: var(--muted); font-family: var(--sf);
      font-size: 1.2rem; font-weight: 600; cursor: not-allowed; transition: all .2s;
    }
    #submit-btn.ready     { background: var(--ua); color: #0f1117; cursor: pointer; }
    #submit-btn.ready.aa  { background: var(--aa); color: #0f1117; }
    #submit-btn.done      { background: #1e293b; color: var(--text); border: 2px solid var(--border-light); cursor: default; }
    #submit-btn:active:not(.done):not(:disabled) { transform: scale(.98); }

    #status-msg {
      max-width: 560px; width: 100%; text-align: center;
      font-size: 1rem; color: var(--muted); min-height: 1.4em; margin-top: .6rem;
    }

    /* ── OVERVIEW ──────────────────────────────────────── */
    #page-overview { padding: 1.5rem 0 6rem; }

    .ov-top { padding: 0 1.2rem; }
    .legend {
      display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1.2rem;
      font-size: 1.1rem; color: var(--text); font-weight: 500;
    }
    .legend span { display: flex; align-items: center; gap: .45rem; }
    .dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }

    .ov-scroll-wrap { overflow-x: auto; padding: 0 1.2rem 1rem; -webkit-overflow-scrolling: touch; }
    .ov-cols { display: flex; flex-direction: row; gap: 0; width: max-content; min-width: 100%; }

    .ov-col {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; min-height: 260px; padding: .85rem .65rem;
      display: flex; flex-direction: column; flex: 1; min-width: 100px;
    }
    .ov-col + .ov-col { margin-left: .7rem; }

    .ov-col-divider {
      width: 1px; background: rgba(232,234,240,.4);
      margin: 0 1.4rem; align-self: stretch; flex-shrink: 0;
    }
    .ov-col-head {
      font-family: var(--sf); font-size: 1.3rem; font-weight: 600;
      color: var(--text); text-align: center;
      padding-bottom: .6rem; margin-bottom: .6rem;
      border-bottom: 1px solid var(--border); line-height: 1.3; flex-shrink: 0;
    }
    .ov-names { flex: 1; }
    .ov-name {
      font-size: 1rem; font-weight: 500; padding: .5rem .5rem;
      border-radius: 6px; margin-bottom: .5rem; text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ov-name.ua { color: var(--ua); background: #0d1f38; outline: 1px solid var(--ua); }
    .ov-name.aa { color: var(--aa); background: #0f2a1e; outline: 1px solid var(--aa); }
    .ov-name.me { outline-width: 2px; }
    .ov-empty   { color: var(--muted); font-size: .95rem; text-align: center; margin-top: .5rem; }

    @media (max-width: 600px) {
      .ov-scroll-wrap { overflow-x: visible; padding: 0 1rem 1rem; }
      .ov-cols { display: grid; grid-template-columns: repeat(2, 1fr); width: 100%; gap: .6rem; }
      .ov-col  { margin-left: 0 !important; min-width: 0; flex: unset; }
      .ov-col-divider { display: none; }
    }

    /* ── REFRESH BUTTON ────────────────────────────────── */
    #refresh-btn {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: none; justify-content: center; align-items: center; gap: .5rem;
      background: var(--bg); border: none; border-top: 1px solid var(--border);
      cursor: pointer; color: var(--muted); font-family: var(--sf); font-size: 1rem;
      padding: 1rem 1.4rem calc(1rem + env(safe-area-inset-bottom));
      transition: color .2s; z-index: 100; width: 100%;
    }
    #refresh-btn.visible { display: flex; }
    #refresh-btn:hover { color: var(--text); }
    #refresh-btn svg { width: 18px; height: 18px; }

    /* ── CONNECTION INDICATOR ──────────────────────────── */
    #conn-indicator {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #374151;
      transition: background .5s;
      flex-shrink: 0;
      position: absolute;
      right: 1.4rem;
      top: 50%;
      transform: translateY(-50%);
    }
    #refresh-btn { position: fixed !important; }
    #conn-indicator.ok  { background: rgba(34, 197, 94, 0.5); }
    #conn-indicator.err { background: rgba(239, 68, 68, 0.5); }

    /* ── SPINNER ───────────────────────────────────────── */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.15); border-top-color: currentColor;
      border-radius: 50%; animation: spin .6s linear infinite;
      vertical-align: middle; margin-right: .4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* ── PASSWORD MODAL ────────────────────────────────── */
    #pw-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 500;
      align-items: center; justify-content: center;
    }
    #pw-overlay.visible { display: flex; }
    #pw-box {
      background: var(--surface); border: 1px solid var(--border-light);
      border-radius: 16px; padding: 2rem; width: 90%; max-width: 320px;
      display: flex; flex-direction: column; gap: 1rem;
    }
    #pw-box h3 { font-size: 1.1rem; font-weight: 600; color: var(--text); }
    #pw-input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: var(--sf);
      font-size: 1.2rem; padding: .7rem 1rem; outline: none;
      transition: border-color .2s;
    }
    #pw-input:focus { border-color: var(--ua); }
    #pw-actions { display: flex; gap: .7rem; }
    #pw-cancel {
      flex: 1; padding: .8rem; border-radius: 10px;
      border: 1px solid var(--border); background: none;
      color: var(--muted); font-family: var(--sf); font-size: 1rem; cursor: pointer;
    }
    #pw-confirm {
      flex: 1; padding: .8rem; border-radius: 10px;
      border: none; background: var(--ua);
      color: #0f1117; font-family: var(--sf); font-size: 1rem;
      font-weight: 600; cursor: pointer;
    }

    /* ── PASSWORD MODAL ────────────────────────────────── */
    #pw-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 1000;
      align-items: center; justify-content: center;
    }
    #pw-modal.visible { display: flex; }
    #pw-box {
      background: var(--surface); border: 1px solid var(--border-light);
      border-radius: 16px; padding: 2rem; width: 90%; max-width: 320px;
      display: flex; flex-direction: column; gap: 1rem;
    }
    #pw-box p { font-size: 1.1rem; font-weight: 600; color: var(--text); text-align: center; }
    #pw-input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: var(--sf);
      font-size: 1.3rem; padding: .75rem 1rem; outline: none;
      text-align: center; letter-spacing: .2em;
      transition: border-color .2s;
    }
    #pw-input:focus { border-color: var(--ua); }
    #pw-error { color: #ef4444; font-size: .9rem; text-align: center; min-height: 1.2em; }
    .pw-btns { display: flex; gap: .7rem; }
    .pw-btn {
      flex: 1; padding: .85rem; border-radius: 10px; border: none;
      font-family: var(--sf); font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    #pw-cancel { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
    #pw-ok     { background: var(--ua); color: #0f1117; }

  </style>
</head>
<body>

<div id="clock-bar">—</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-checkin" onclick="showTab('checkin')">Check-in</button>
  <button class="tab-btn" id="tab-overview" onclick="showTab('overview')">Übersicht</button>
</div>

<!-- CHECK-IN -->
<div id="page-checkin" class="page active">
  <div class="card">
    <div class="card-title">Schritt 1 — Name</div>
    <input type="text" id="name-input" placeholder="Dein Name…" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="card">
    <div class="card-title">Schritt 2 — Funktion</div>
    <div class="role-grid">
      <button class="role-btn" data-role="UA" onclick="selectRole('UA')">UA / UÄ</button>
      <button class="role-btn" data-role="AA" onclick="selectRole('AA')">AA / AÄ</button>
    </div>
  </div>
  <div class="card" id="card-loc">
    <div class="card-title">Schritt 3 — Ort</div>
    <div class="loc-grid" id="loc-grid"></div>
  </div>
  <button id="submit-btn" onclick="submitCheckin()" disabled>Check-in</button>
  <div id="status-msg"></div>
</div>

<!-- OVERVIEW -->
<div id="page-overview" class="page">
  <div class="ov-top">
    <div class="legend">
      <span><span class="dot" style="background:var(--ua)"></span>UA / UÄ</span>
      <span><span class="dot" style="background:var(--aa)"></span>AA / AÄ</span>
    </div>
  </div>
  <div class="ov-scroll-wrap">
    <div class="ov-cols" id="ov-cols"></div>
  </div>
</div>

<!-- REFRESH (overview only) -->
<button id="refresh-btn" onclick="triggerRefresh()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
    <path d="M3 3v5h5"/>
  </svg>
  Zurücksetzen
  <div id="conn-indicator"></div>
</button>



<script>
const FIREBASE_URL = 'https://rapport-plan-default-rtdb.europe-west1.firebasedatabase.app';

// Fetch with 10s timeout
async function fetchT(url, opts) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), 10000);
  try {
    return await fetch(url, { ...opts, signal: ctrl.signal });
  } finally {
    clearTimeout(tid);
  }
}
const RESET_HOUR   = 0;
const RESET_MINUTE = 0;
const LOCATIONS = [
  'Saal 11', 'Saal 13', 'Saal 14', 'Saal 15',
  'Saal 16', 'Saal 3/19/20', 'SS Gross', 'SS Klein',
];
const DIVIDER_AFTER = 4;

let myId = localStorage.getItem('cid');
if (!myId) {
  myId = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2) + Date.now()).replace(/-/g, '');
  localStorage.setItem('cid', myId);
}

let selectedRole = null;
let selectedLoc  = null;
let currentData  = null;
let hasCheckedIn = false;

window.addEventListener('DOMContentLoaded', () => {
  buildLocGrid();
  const saved = localStorage.getItem('checkin_name');
  if (saved) document.getElementById('name-input').value = saved;
  document.getElementById('name-input').addEventListener('input', updateBtn);
  startClock();
  startRealtimeListener();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
});

// ── Clock ──────────────────────────────────────────────
function startClock() {
  const el = document.getElementById('clock-bar');
  const tick = () => {
    const now     = new Date();
    const weekday = now.toLocaleDateString('de-CH', { weekday: 'long' });
    const date    = now.toLocaleDateString('de-CH', { day: '2-digit', month: '2-digit', year: 'numeric' });
    el.textContent = `${weekday}, ${date}`;
  };
  tick(); setInterval(tick, 60_000);
}

// ── Connection indicator ───────────────────────────────
function setConn(ok) {
  const el = document.getElementById('conn-indicator');
  el.classList.toggle('ok', ok);
  el.classList.toggle('err', !ok);
}

// ── Firebase ───────────────────────────────────────────
function startRealtimeListener() {
  const es = new EventSource(`${FIREBASE_URL}/checkin.json`);
  es.addEventListener('put', e => {
    setConn(true);
    const payload = JSON.parse(e.data);
    currentData = payload.data || emptyData();
    maybeReset().then(() => renderOverview());
  });
  es.addEventListener('patch', e => {
    setConn(true);
    const patch = JSON.parse(e.data).data;
    if (currentData && patch) {
      if (patch.entries) { if (!currentData.entries) currentData.entries = {}; Object.assign(currentData.entries, patch.entries); }
      renderOverview();
    }
  });
  es.onerror = () => {
    setConn(false);
    es.close();
    loadData();
    setInterval(loadData, 15_000);
  };
}

async function loadData() {
  try {
    const res = await fetch(`${FIREBASE_URL}/checkin.json?t=${Date.now()}`);
    currentData = (await res.json()) || emptyData();
    await maybeReset();
    renderOverview();
    setConn(true);
  } catch(e) {
    console.error('load:', e);
    setConn(false);
  }
}

async function writeAll(data) {
  const res = await fetch(`${FIREBASE_URL}/checkin.json`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
  if (!res.ok) throw new Error(await res.text());
}

function emptyData() { return { lastReset: todayStr(), entries: {} }; }
function todayStr()  { return new Date().toISOString().slice(0, 10); }

async function maybeReset() {
  if (!currentData) return;
  const now  = new Date();
  const past = now.getHours() > RESET_HOUR
    || (now.getHours() === RESET_HOUR && now.getMinutes() >= RESET_MINUTE);
  if (currentData.lastReset !== todayStr() && past) {
    currentData = emptyData();
    await writeAll(currentData);
  }
}

// ── Refresh ────────────────────────────────────────────
function triggerRefresh() {
  const modal = document.getElementById('pw-modal');
  const input = document.getElementById('pw-input');
  document.getElementById('pw-error').textContent = '';
  input.value = '';
  modal.classList.add('visible');
  setTimeout(() => input.focus(), 100);
}

function closePwModal() {
  document.getElementById('pw-modal').classList.remove('visible');
}

async function checkPw() {
  const input = document.getElementById('pw-input');
  if (input.value !== '1234') {
    document.getElementById('pw-error').textContent = 'Falsches Passwort';
    input.value = '';
    input.focus();
    return;
  }
  closePwModal();
  if (!confirm('Alle Einträge löschen?')) return;
  try {
    const fresh = emptyData();
    await writeAll(fresh);
    currentData  = fresh;
    hasCheckedIn = false;
    const btn = document.getElementById('submit-btn');
    btn.classList.remove('done');
    btn.disabled = true;
    document.getElementById('status-msg').textContent = '';
    updateBtn();
    renderOverview();
  } catch(e) { console.error(e); alert('Fehler beim Zurücksetzen'); }
}

// ── Tabs ───────────────────────────────────────────────
function showTab(tab) {
  document.getElementById('tab-checkin').classList.toggle('active', tab === 'checkin');
  document.getElementById('tab-overview').classList.toggle('active', tab === 'overview');
  document.getElementById('page-checkin').classList.toggle('active', tab === 'checkin');
  document.getElementById('page-overview').classList.toggle('active', tab === 'overview');
  document.getElementById('refresh-btn').classList.toggle('visible', tab === 'overview');
  if (tab === 'overview') loadData();
}

// ── Location grid ──────────────────────────────────────
function buildLocGrid() {
  const grid = document.getElementById('loc-grid');
  LOCATIONS.forEach((name, i) => {
    if (i === DIVIDER_AFTER + 1) {
      grid.querySelectorAll('.loc-btn').forEach(b => {
        if (b.id === `lb-${DIVIDER_AFTER - 1}` || b.id === `lb-${DIVIDER_AFTER}`)
          b.classList.add('before-divider');
      });
      const div = document.createElement('div');
      div.className = 'loc-divider';
      grid.appendChild(div);
    }
    const btn = document.createElement('button');
    btn.className = 'loc-btn'; btn.id = `lb-${i}`;
    btn.textContent = name;
    if (i === DIVIDER_AFTER + 1 || i === DIVIDER_AFTER + 2) btn.classList.add('after-divider');
    btn.onclick = () => selectLoc(i);
    grid.appendChild(btn);
  });
}

function selectRole(role) {
  selectedRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.className = 'role-btn');
  document.querySelector(`[data-role="${role}"]`).classList.add(role === 'UA' ? 'sel-ua' : 'sel-aa');
  if (selectedLoc !== null) paintLoc(selectedLoc);
  updateBtn();
}

function selectLoc(idx) {
  selectedLoc = idx;
  document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('sel-ua', 'sel-aa'));
  paintLoc(idx);
  updateBtn();
}

function paintLoc(idx) {
  const cls = selectedRole === 'UA' ? 'sel-ua' : selectedRole === 'AA' ? 'sel-aa' : '';
  const btn = document.getElementById(`lb-${idx}`);
  if (btn) { btn.classList.remove('sel-ua', 'sel-aa'); if (cls) btn.classList.add(cls); }
}

function updateBtn() {
  if (hasCheckedIn) return;
  const name = document.getElementById('name-input').value.trim();
  const btn  = document.getElementById('submit-btn');
  const ok   = !!(name && selectedRole && selectedLoc !== null);
  btn.disabled = !ok;
  btn.classList.toggle('ready', ok);
  if (ok) btn.classList.toggle('aa', selectedRole === 'AA');
  else btn.classList.remove('aa');
  btn.textContent = ok
    ? `Check-in: ${selectedRole === 'UA' ? 'UA/UÄ' : 'AA/AÄ'} — ${LOCATIONS[selectedLoc]}`
    : 'Check-in';
}

// ── Submit ─────────────────────────────────────────────
async function submitCheckin() {
  if (hasCheckedIn) return;
  const name = document.getElementById('name-input').value.trim();
  if (!name || selectedRole === null || selectedLoc === null) return;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Speichern…';
  localStorage.setItem('checkin_name', name);

  try {
    // PATCH only this user's entry — no race condition with other users
    const entry = { name, role: selectedRole, loc: selectedLoc, ts: Date.now() };
    const res = await fetchT(`${FIREBASE_URL}/checkin/entries/${myId}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry),
    });
    if (!res.ok) throw new Error(await res.text());
    // Also set lastReset
    await fetchT(`${FIREBASE_URL}/checkin/lastReset.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(todayStr()),
    });
    // Update local state without overwriting others
    if (!currentData) currentData = emptyData();
    if (!currentData.entries) currentData.entries = {};
    currentData.entries[myId] = entry;
    renderOverview();

    hasCheckedIn = true;
    btn.disabled = true;
    btn.classList.remove('ready', 'aa');
    btn.classList.add('done');
    btn.textContent = `${name}  —  ${selectedRole === 'UA' ? 'UA/UÄ' : 'AA/AÄ'}  —  ${LOCATIONS[selectedLoc]}  ✓`;
    document.getElementById('status-msg').textContent = '';
  } catch(e) {
    console.error(e);
    document.getElementById('status-msg').textContent = 'Fehler – bitte nochmal versuchen';
  } finally {
    if (!hasCheckedIn) {
      btn.disabled = false;
      updateBtn();
    }
  }
}

// ── Render overview ────────────────────────────────────
function renderOverview() {
  const wrap = document.getElementById('ov-cols');
  wrap.innerHTML = '';
  const buckets = LOCATIONS.map(() => []);
  const entries = currentData?.entries || {};
  Object.entries(entries).forEach(([uid, e]) => {
    if (e && e.loc >= 0 && e.loc < LOCATIONS.length)
      buckets[e.loc].push({ name: e.name, role: e.role, isMe: uid === myId });
  });
  LOCATIONS.forEach((locName, i) => {
    if (i === DIVIDER_AFTER + 1) {
      const div = document.createElement('div');
      div.className = 'ov-col-divider';
      wrap.appendChild(div);
    }
    const members = buckets[i];
    const col = document.createElement('div');
    col.className = 'ov-col';
    col.innerHTML = `
      <div class="ov-col-head">${locName}</div>
      <div class="ov-names">
        ${members.length === 0
          ? '<div class="ov-empty">—</div>'
          : members.map(m =>
              `<div class="ov-name ${m.role.toLowerCase()}${m.isMe ? ' me' : ''}" title="${m.name}">${m.name}</div>`
            ).join('')}
      </div>
    `;
    wrap.appendChild(col);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPw();
    if (e.key === 'Escape') closePwModal();
  });
});
</script>
