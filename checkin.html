<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#181c27">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rapport Check-in">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Rapport Check-in</title>
  <style>
    :root {
      --bg:           #0f1117;
      --surface:      #181c27;
      --border:       #2a2f3d;
      --border-light: #3d4558;
      --text:         #e8eaf0;
      --muted:        #6b7280;
      --ua:           #60a5fa;
      --aa:           #34d399;
      --sf: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--sf); font-size: 20px;
      min-height: 100dvh; display: flex; flex-direction: column;
      padding-top: env(safe-area-inset-top);
    }

    /* CLOCK */
    #clock-bar {
      font-family: var(--sf); font-size: 1.6rem; font-weight: 600;
      color: var(--text); text-align: center; padding: 1.1rem 1.5rem;
      border-bottom: 1px solid var(--border); background: var(--surface);
    }

    /* TABS */
    .tab-bar {
      display: flex; background: var(--surface);
      border-bottom: 2px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .tab-btn {
      flex: 1; padding: 1.1rem; background: none; border: none;
      color: var(--muted); font-family: var(--sf); font-size: 1rem;
      cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: all .2s;
    }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--text); }

    /* PAGES */
    .page { display: none; }
    .page.active { display: flex; flex-direction: column; }

    /* CHECK-IN */
    #page-checkin { align-items: center; padding: 2rem 1rem 5rem; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.8rem;
      width: 100%; max-width: 560px; margin-bottom: 1.2rem;
    }
    #card-loc { border-color: var(--border-light); }
    .card-title {
      font-family: var(--sf); font-size: 1.3rem; font-weight: 500;
      color: var(--muted); margin-bottom: 1.1rem;
    }
    input[type="text"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: var(--sf);
      font-size: 1.3rem; padding: .8rem 1.1rem; outline: none; transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: var(--ua); }
    input[type="text"]::placeholder { color: var(--muted); }

    .role-grid { display: flex; gap: .8rem; }
    .role-btn {
      flex: 1; padding: 1.1rem; border-radius: 12px;
      border: 2px solid var(--border); background: var(--bg);
      color: var(--muted); font-family: var(--sf);
      font-size: 1.3rem; font-weight: 600; cursor: pointer; transition: all .18s;
    }
    .role-btn.sel-ua { border-color: var(--ua); color: var(--ua); background: #0d1f38; }
    .role-btn.sel-aa { border-color: var(--aa); color: var(--aa); background: #0f2a1e; }

    .loc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .65rem; }
    .loc-btn {
      padding: 1rem .6rem; border-radius: 12px;
      border: 2px solid var(--border); background: var(--bg);
      color: var(--muted); font-family: var(--sf);
      font-size: 1.3rem; font-weight: 500; cursor: pointer; transition: all .18s; text-align: center;
    }
    .loc-btn.sel-ua { border-color: var(--ua); color: var(--ua); background: #0d1f38; }
    .loc-btn.sel-aa { border-color: var(--aa); color: var(--aa); background: #0f2a1e; }
    .loc-btn.before-divider { margin-bottom: 1rem; }
    .loc-btn.after-divider  { margin-top: 1rem; }
    .loc-divider { grid-column: 1/-1; height: 1px; background: var(--border-light); }

    #submit-btn {
      width: 100%; max-width: 560px; padding: 1.2rem; border-radius: 12px;
      border: none; background: #1e293b; color: var(--muted); font-family: var(--sf);
      font-size: 1.2rem; font-weight: 600; cursor: not-allowed; transition: all .2s;
    }
    #submit-btn.ready    { background: var(--ua); color: #0f1117; cursor: pointer; }
    #submit-btn.ready.aa { background: var(--aa); color: #0f1117; }
    #submit-btn.done     { background: #2a3347; color: var(--text); border: 2px solid var(--border-light); cursor: default; }
    #submit-btn:active:not(.done):not(:disabled) { transform: scale(.98); }

    #status-msg {
      max-width: 560px; width: 100%; text-align: center;
      font-size: 1rem; color: #f87171; min-height: 1.4em; margin-top: .6rem;
    }

    /* OVERVIEW */
    #page-overview { padding: 1.5rem 0 6rem; }
    .legend {
      display: flex; justify-content: center; gap: 1.5rem;
      margin: 0 1.2rem 1.2rem; font-size: 1.1rem; color: var(--text); font-weight: 500;
    }
    .legend span { display: flex; align-items: center; gap: .45rem; }
    .dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }

    .ov-scroll-wrap { overflow-x: auto; padding: 0 1.2rem 1rem; -webkit-overflow-scrolling: touch; }
    .ov-cols { display: flex; gap: 0; width: max-content; min-width: 100%; }

    .ov-col {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; min-height: 260px; padding: .85rem .65rem;
      display: flex; flex-direction: column; flex: 1; min-width: 100px;
    }
    .ov-col + .ov-col { margin-left: .7rem; }
    .ov-col-divider { width: 1px; background: rgba(232,234,240,.4); margin: 0 1.4rem; align-self: stretch; flex-shrink: 0; }

    .ov-col-head {
      font-family: var(--sf); font-size: 1.5rem; font-weight: 600;
      color: var(--text); text-align: center;
      padding-bottom: .6rem; margin-bottom: .6rem;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .ov-col-team { font-size: .85rem; font-weight: 400; color: var(--muted); }
    .ov-names { flex: 1; }
    .ov-name {
      font-size: 1.2rem; font-weight: 500; padding: .5rem .5rem;
      border-radius: 6px; margin-bottom: .5rem; text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ov-name.ua { color: var(--ua); background: #0d1f38; outline: 1px solid var(--ua); }
    .ov-name.aa { color: var(--aa); background: #0f2a1e; outline: 1px solid var(--aa); }
    .ov-name.me { outline-width: 2px; }
    .ov-empty   { color: var(--muted); font-size: .95rem; text-align: center; margin-top: .5rem; }

    @media (max-width: 600px) {
      .ov-scroll-wrap { overflow-x: visible; padding: 0 1rem 1rem; }
      .ov-cols { display: grid; grid-template-columns: repeat(2, 1fr); width: 100%; gap: .6rem; }
      .ov-col  { margin-left: 0 !important; min-width: 0; flex: unset; }
      .ov-col-divider { display: none; }
    }

    /* FOOTER BAR */
    #footer-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: none; align-items: center; justify-content: center;
      background: var(--bg); border-top: 1px solid var(--border);
      padding: .85rem 1.2rem calc(.85rem + env(safe-area-inset-bottom));
      z-index: 100;
    }
    #footer-bar.visible { display: flex; }

    #edit-toggle {
      position: absolute; left: 1.2rem;
      display: flex; align-items: center; gap: .4rem;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-family: var(--sf); font-size: .95rem;
      padding: .3rem .5rem; border-radius: 8px; transition: color .2s;
    }
    #edit-toggle:hover { color: var(--text); }
    #edit-toggle.on { color: #f97316; }
    #edit-toggle svg { width: 16px; height: 16px; flex-shrink: 0; stroke: currentColor; }

    #refresh-btn {
      display: flex; align-items: center; gap: .5rem;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-family: var(--sf); font-size: .95rem;
      padding: .3rem .5rem; border-radius: 8px; transition: color .2s;
    }
    #refresh-btn:hover { color: var(--text); }
    #refresh-btn svg { width: 18px; height: 18px; }

    /* CONNECTION DOT */
    #conn-dot {
      position: absolute; right: 1.2rem;
      width: 9px; height: 9px; border-radius: 50%;
      background: #374151; transition: background .5s;
      cursor: pointer;
    }
    #conn-dot.ok  { background: rgba(34,197,94,.5); }
    #conn-dot.err { background: rgba(239,68,68,.5); }
    @media (max-width: 600px) {
      #edit-toggle span, #refresh-btn span { display: none; }
    }

    /* PASSWORD MODAL */
    #pw-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 500;
      align-items: center; justify-content: center;
    }
    #pw-overlay.visible { display: flex; }
    #pw-box {
      background: var(--surface); border: 1px solid var(--border-light);
      border-radius: 16px; padding: 2rem; width: 90%; max-width: 300px;
      display: flex; flex-direction: column; gap: 1rem;
    }
    #pw-box h3 { font-size: 1.1rem; font-weight: 600; color: var(--text); }
    #pw-field {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: var(--sf);
      font-size: 1.2rem; padding: .7rem 1rem; outline: none; transition: border-color .2s;
    }
    #pw-field:focus { border-color: var(--ua); }
    #pw-error { font-size: .9rem; color: #f87171; min-height: 1.2em; }
    #pw-actions { display: flex; gap: .7rem; }
    .pw-btn {
      flex: 1; padding: .8rem; border-radius: 10px; font-family: var(--sf);
      font-size: 1rem; cursor: pointer;
    }
    #pw-cancel { border: 1px solid var(--border); background: none; color: var(--muted); }
    #pw-ok     { border: none; background: var(--ua); color: #0f1117; font-weight: 600; }

    .circle-check {
      display: inline-flex; align-items: center; justify-content: center;
      width: 2rem; height: 2rem; border-radius: 50%;
      border: 2px solid var(--text);
      font-size: 1.1rem; line-height: 1;
    }


    /* DRAG & DROP EDIT MODE */
    #edit-toggle {
      display: none;
      position: absolute; left: 1.2rem;
      display: flex; align-items: center; gap: .5rem;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-family: var(--sf); font-size: .9rem;
      padding: .4rem .7rem; border-radius: 8px; transition: all .2s;
    }
    #edit-toggle.visible { display: flex; }
    #edit-toggle svg { width: 16px; height: 16px; flex-shrink: 0; }

    .edit-mode .ov-name {
      cursor: grab; opacity: .9;
    }
    .edit-mode .ov-name:active { cursor: grabbing; }
    .edit-mode .ov-col {
      border-style: dashed; border-color: var(--border-light);
      transition: border-color .15s, background .15s;
    }
    .edit-mode .ov-col.drag-over {
      border-color: #f97316; background: #2a1500;
    }
    .ov-name.dragging { opacity: .4; }
    /* SPINNER */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.15); border-top-color: currentColor;
      border-radius: 50%; animation: spin .6s linear infinite;
      vertical-align: middle; margin-right: .4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ANALYTICS OVERLAY */
    #analytics-overlay {
      display: none; position: fixed; inset: 0;
      background: var(--bg); z-index: 600;
      flex-direction: column; overflow: hidden;
    }
    #analytics-overlay.visible { display: flex; }
    #analytics-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    #analytics-header h2 { font-size: 1.2rem; font-weight: 600; }
    #analytics-close {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1.5rem; padding: .2rem .5rem; line-height: 1;
    }
    #analytics-close:hover { color: var(--text); }
    #analytics-body {
      flex: 1; overflow-y: auto; padding: 1.2rem;
      -webkit-overflow-scrolling: touch;
    }
    .ana-section { margin-bottom: 1.5rem; }
    .ana-section-title {
      font-size: 1rem; font-weight: 600; color: var(--muted);
      margin-bottom: .8rem;
    }
    .ana-date-row {
      display: flex; gap: .8rem; align-items: center; flex-wrap: wrap;
    }
    .ana-input {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: var(--sf);
      font-size: 1rem; padding: .6rem .8rem; outline: none;
      color-scheme: dark;
    }
    .ana-input:focus { border-color: var(--ua); }
    .ana-sep { color: var(--muted); font-size: .9rem; }
    .ana-days { display: flex; gap: .4rem; flex-wrap: wrap; }
    .ana-day-btn {
      padding: .5rem .8rem; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--muted); font-family: var(--sf); font-size: .85rem;
      cursor: pointer; transition: all .15s;
    }
    .ana-day-btn.active {
      border-color: var(--ua); color: var(--ua); background: #0d1f38;
    }
    .ana-filter-btn {
      padding: .45rem .7rem; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--muted); font-family: var(--sf); font-size: .8rem;
      cursor: pointer; transition: all .15s;
    }
    .ana-filter-btn.active {
      border-color: var(--ua); color: var(--ua); background: #0d1f38;
    }
    .ana-filter-btn.active-aa {
      border-color: var(--aa); color: var(--aa); background: #0f2a1e;
    }
    #ana-status {
      font-size: .9rem; color: var(--muted); margin-bottom: 1rem;
      min-height: 1.2em;
    }
    .ana-chart-group { margin-bottom: 1.5rem; }
    .ana-chart-title {
      font-size: .95rem; font-weight: 600; color: var(--text);
      margin-bottom: .6rem; padding-bottom: .4rem;
      border-bottom: 1px solid var(--border);
    }
    .ana-bar-wrap { margin-bottom: .4rem; }
    .ana-bar-row {
      display: flex; align-items: center; gap: .6rem;
      cursor: pointer; padding: .15rem 0; border-radius: 6px;
      transition: background .15s;
    }
    .ana-bar-row:hover { background: rgba(255,255,255,.03); }
    .ana-bar-row .ana-expand-arrow {
      font-size: .7rem; color: var(--muted); width: 14px; text-align: center;
      flex-shrink: 0; transition: transform .2s;
    }
    .ana-bar-wrap.open .ana-expand-arrow { transform: rotate(90deg); }
    .ana-detail {
      display: none; padding: .3rem 0 .3rem 154px;
    }
    .ana-bar-wrap.open .ana-detail { display: block; }
    .ana-detail-row {
      display: flex; align-items: center; gap: .5rem;
      margin-bottom: .3rem;
    }
    .ana-detail-day {
      font-size: .75rem; color: var(--muted); width: 28px; text-align: right; flex-shrink: 0;
    }
    .ana-detail-track {
      flex: 1; height: 16px; background: var(--bg);
      border-radius: 4px; overflow: hidden;
    }
    .ana-detail-fill {
      height: 100%; border-radius: 4px;
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: .4rem; min-width: 22px;
    }
    .ana-detail-fill.ua { background: rgba(96,165,250,.2); }
    .ana-detail-fill.aa { background: rgba(52,211,153,.2); }
    .ana-detail-count {
      font-size: .65rem; font-weight: 600; color: var(--text);
    }
    @media (max-width: 600px) {
      .ana-detail { padding-left: 114px; }
    }
    .ana-bar-label {
      font-size: .8rem; color: var(--muted); min-width: 140px;
      text-align: right; flex-shrink: 0;
    }
    .ana-bar-track {
      flex: 1; height: 24px; background: var(--bg);
      border-radius: 6px; overflow: hidden; position: relative;
    }
    .ana-bar-fill {
      height: 100%; border-radius: 6px; transition: width .3s;
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: .5rem; min-width: 28px;
    }
    .ana-bar-fill.ua { background: rgba(96,165,250,.3); }
    .ana-bar-fill.aa { background: rgba(52,211,153,.3); }
    .ana-bar-count {
      font-size: .75rem; font-weight: 600; color: var(--text);
    }
    .ana-empty {
      color: var(--muted); font-size: .95rem; text-align: center;
      padding: 2rem 0;
    }
    @media (max-width: 600px) {
      .ana-bar-label { min-width: 100px; font-size: .7rem; }
    }

    /* SNAPSHOT HEATMAP */
    .ana-snapshot { margin-bottom: 1.5rem; }
    .ana-snapshot-title {
      font-size: .95rem; font-weight: 600; color: var(--text);
      margin-bottom: .6rem; padding-bottom: .4rem;
      border-bottom: 1px solid var(--border);
    }
    .ana-snapshot-legend {
      display: flex; align-items: center; gap: 1.2rem;
      margin-bottom: .8rem; flex-wrap: wrap;
    }
    .ana-snapshot-legend-item {
      display: flex; align-items: center; gap: .35rem;
      font-size: .75rem; color: var(--muted);
    }
    .ana-snapshot-legend-dot {
      width: 12px; height: 12px; border-radius: 4px;
    }
    .ana-snapshot-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: .6rem;
    }
    @media (max-width: 600px) {
      .ana-snapshot-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .ana-snapshot-block {
      border-radius: 10px; padding: .7rem .5rem;
      text-align: center; cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .2s, transform .1s;
    }
    .ana-snapshot-block:active { transform: scale(.97); }
    .ana-snapshot-block.selected { border-color: var(--text); }
    .ana-snapshot-block-name {
      font-size: .85rem; font-weight: 600; color: var(--text);
      margin-bottom: .2rem;
    }
    .ana-snapshot-block-info {
      font-size: .7rem; color: rgba(255,255,255,.7);
    }
    .ana-snapshot-block-arrow {
      font-size: .8rem; font-weight: 700;
    }
    .ana-snapshot-detail {
      margin-top: .8rem; padding: .8rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; display: none;
    }
    .ana-snapshot-detail.visible { display: block; }
    .ana-snapshot-detail-title {
      font-size: .85rem; font-weight: 600; color: var(--text);
      margin-bottom: .5rem;
    }
  </style>
</head>
<body>

<div id="clock-bar">—</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-checkin" onclick="showTab('checkin')">Check-in</button>
  <button class="tab-btn" id="tab-overview" onclick="showTab('overview')">Übersicht</button>
</div>

<!-- CHECK-IN -->
<div id="page-checkin" class="page active">
  <div class="card">
    <div class="card-title">Schritt 1 — Name</div>
    <input type="text" id="name-input" placeholder="Dein Name…" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="card">
    <div class="card-title">Schritt 2 — Funktion</div>
    <div class="role-grid">
      <button class="role-btn" data-role="UA" onclick="selectRole('UA')">UA / UÄ</button>
      <button class="role-btn" data-role="AA" onclick="selectRole('AA')">AA / AÄ</button>
    </div>
  </div>
  <div class="card" id="card-loc">
    <div class="card-title">Schritt 3 — Ort</div>
    <div class="loc-grid" id="loc-grid"></div>
  </div>
  <button id="submit-btn" onclick="submitCheckin()" disabled>Check-in</button>
  <div id="status-msg"></div>
</div>

<!-- OVERVIEW -->
<div id="page-overview" class="page">
  <div class="legend">
    <span><span class="dot" style="background:var(--ua)"></span>UA / UÄ</span>
    <span><span class="dot" style="background:var(--aa)"></span>AA / AÄ</span>
  </div>
  <div class="ov-scroll-wrap">
    <div class="ov-cols" id="ov-cols"></div>
  </div>
</div>

<!-- FOOTER (overview only) -->
<div id="footer-bar">
  <button id="edit-toggle" onclick="toggleEditMode()" title="Verschieben">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
    Verschieben
  </button>
  <button id="refresh-btn" onclick="openPwModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
    </svg>
    <span>Zurücksetzen</span>
  </button>
  <div id="conn-dot" onclick="openAnalyticsPw()"></div>
</div>

<!-- ANALYTICS PASSWORD MODAL -->
<div id="ana-pw-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:550;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--border-light);border-radius:16px;padding:2rem;width:90%;max-width:300px;display:flex;flex-direction:column;gap:1rem;">
    <h3 style="font-size:1.1rem;font-weight:600;color:var(--text);">Analyse</h3>

      <button class="pw-btn" id="pw-cancel" onclick="closePwModal()">Abbrechen</button>
      <button class="pw-btn" id="pw-ok" onclick="confirmPwAndReset()">OK</button>
    </div>

<script>
const FIREBASE_URL = 'https://rapport-plan-default-rtdb.europe-west1.firebasedatabase.app';
const RESET_HOUR   = 0;
const RESET_MINUTE = 0;
const ALL_LOC_NAMES = ['Saal 11','Saal 13','Saal 14','Saal 15','Saal 16','Saal 3/19/20',
  'SS Fuss','SS WS','SS OE','SS Knie','SS Hüfte','SS Fuss (GiZi)'];
// SS names change by weekday (0=Sun,1=Mon,...,5=Fri,6=Sat)
const SS_NAMES = {
  0: ['SS Fuss',  'SS WS'],         // Sonntag (fallback Mo)
  1: ['SS Fuss',  'SS WS'],         // Montag
  2: ['SS OE',    'SS Knie'],       // Dienstag
  3: ['SS Hüfte', 'SS OE'],         // Mittwoch
  4: ['SS WS',    'SS Fuss (GiZi)'],// Donnerstag
  5: ['SS Knie',  'SS Hüfte'],      // Freitag
  6: ['SS Fuss',  'SS WS'],         // Samstag (fallback Mo)
};
// Team/specialty per Saal by weekday (indices 0-5 = Saal 11,13,14,15,16,Überlauf)
const TEAM_NAMES = {
  0: ['Hüfte','Knie','Slot 1','Hüfte','OE',''],              // So (fallback Mo)
  1: ['Hüfte','Knie','Slot 1','Hüfte','OE',''],              // Mo
  2: ['Slot 2','Hüfte','Slot 1','WS','Hüfte',''],            // Di
  3: ['WS','WS','Slot 1','Knie','Fuss',''],                   // Mi
  4: ['Slot 2','OE','Slot 1','Hüfte','Knie',''],             // Do
  5: ['Slot 2','Fuss','Tumor/Slot 1','OE','WS',''],          // Fr
  6: ['Hüfte','Knie','Slot 1','Hüfte','OE',''],              // Sa (fallback Mo)
};
const ALL_TEAM_NAMES = ['Hüfte','Knie','OE','WS','Fuss','Slot 1','Slot 2','Tumor/Slot 1','Fuss (GiZi)'];

function getLocations() {
  const day = new Date().getDay();
  const ss = SS_NAMES[day] || SS_NAMES[1];
  return ['Saal 11','Saal 13','Saal 14','Saal 15','Saal 16','Saal 3/19/20', ss[0], ss[1]];
}
function getTeams(day) {
  if (day === undefined) day = new Date().getDay();
  const t = TEAM_NAMES[day] || TEAM_NAMES[1];
  return [t[0], t[1], t[2], t[3], t[4], t[5], '', '']; // SS rooms have no team subtitle
}
function getTeamForLoc(locIndex, weekday) {
  const teams = getTeams(weekday);
  return teams[locIndex] || '';
}
const LOCATIONS = getLocations();
const TEAMS = getTeams();
const DIVIDER_AFTER = 4;

// Unique browser ID (no hyphens = valid Firebase key)
let myId = localStorage.getItem('cid');
if (!myId) {
  myId = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)+Date.now()).replace(/-/g,'');
  localStorage.setItem('cid', myId);
}

let selectedRole = null;
let selectedLoc  = null;
let currentData  = null;
let hasCheckedIn = false;

// ── Boot ───────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  buildLocGrid();
  const saved = localStorage.getItem('checkin_name');
  if (saved) document.getElementById('name-input').value = saved;
  document.getElementById('name-input').addEventListener('input', updateBtn);
  document.getElementById('pw-field').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmPwAndReset();
    if (e.key === 'Escape') closePwModal();
  });
  document.getElementById('ana-pw-field').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmAnalyticsPw();
    if (e.key === 'Escape') closeAnalyticsPw();
  });
  buildAnalyticsFilters();
  startClock();
  startRealtimeListener();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
});

// ── Clock ──────────────────────────────────────────────
function startClock() {
  const el = document.getElementById('clock-bar');
  const tick = () => {
    const now = new Date();
    el.textContent = now.toLocaleDateString('de-CH', { weekday:'long', day:'2-digit', month:'2-digit', year:'numeric' });
  };
  tick(); setInterval(tick, 60000);
}

// ── Connection dot ─────────────────────────────────────
function setConn(ok) {
  const el = document.getElementById('conn-dot');
  el.classList.toggle('ok', ok);
  el.classList.toggle('err', !ok);
}

// ── Firebase realtime ──────────────────────────────────
function startRealtimeListener() {
  const es = new EventSource(`${FIREBASE_URL}/checkin.json`);
  es.addEventListener('put', e => {
    setConn(true);
    const payload = JSON.parse(e.data);
    const path = payload.path;
    const data = payload.data;
    if (path === '/') {
      // Full replacement
      currentData = data || emptyData();
    } else {
      // Partial update - merge into currentData
      if (!currentData) currentData = emptyData();
      const parts = path.split('/').filter(Boolean);
      let obj = currentData;
      for (let j = 0; j < parts.length - 1; j++) {
        if (!obj[parts[j]]) obj[parts[j]] = {};
        obj = obj[parts[j]];
      }
      obj[parts[parts.length - 1]] = data;
    }
    maybeReset().then(() => renderOverview());
  });
  es.addEventListener('patch', e => {
    setConn(true);
    const patch = JSON.parse(e.data).data;
    if (currentData && patch) {
      if (!currentData.entries) currentData.entries = {};
      if (patch.entries) Object.assign(currentData.entries, patch.entries);
      renderOverview();
    }
  });
  es.onerror = () => {
    setConn(false);
    es.close();
    loadData();
    setInterval(loadData, 15000);
  };
}

async function loadData() {
  try {
    const res = await fetch(`${FIREBASE_URL}/checkin.json?t=${Date.now()}`);
    currentData = (await res.json()) || emptyData();
    await maybeReset();
    renderOverview();
    setConn(true);
  } catch(e) {
    console.error('loadData:', e);
    setConn(false);
  }
}

async function writeAll(data) {
  const res = await fetch(`${FIREBASE_URL}/checkin.json`, {
    method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data),
  });
  if (!res.ok) throw new Error(await res.text());
}

function emptyData() { return { lastReset: todayStr(), entries: {} }; }
function todayStr()  { return new Date().toISOString().slice(0,10); }

async function maybeReset() {
  if (!currentData) return;
  const now  = new Date();
  const past = now.getHours() > RESET_HOUR || (now.getHours() === RESET_HOUR && now.getMinutes() >= RESET_MINUTE);
  if (currentData.lastReset !== todayStr() && past) {
    currentData = emptyData();
    await writeAll(currentData);
  }
}

// ── Password modal ─────────────────────────────────────
function openPwModal() {
  document.getElementById('pw-field').value = '';
  document.getElementById('pw-error').textContent = '';
  document.getElementById('pw-overlay').classList.add('visible');
  setTimeout(() => document.getElementById('pw-field').focus(), 100);
}
function closePwModal() {
  document.getElementById('pw-overlay').classList.remove('visible');
}
async function confirmPwAndReset() {
  if (document.getElementById('pw-field').value !== '1234') {
    document.getElementById('pw-error').textContent = 'Falsches Passwort';
    document.getElementById('pw-field').value = '';
    document.getElementById('pw-field').focus();
    return;
  }
  closePwModal();
  if (!confirm('Alle Einträge löschen?')) return;
  try {
    const fresh = emptyData();
    await writeAll(fresh);
    currentData  = fresh;
    hasCheckedIn = false;
    const btn = document.getElementById('submit-btn');
    btn.classList.remove('done'); btn.disabled = true;
    document.getElementById('status-msg').textContent = '';
    selectedRole = null; selectedLoc = null;
    document.querySelectorAll('.role-btn').forEach(b => b.className = 'role-btn');
    document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('sel-ua','sel-aa'));
    updateBtn();
    renderOverview();
  } catch(e) { console.error(e); alert('Fehler beim Zurücksetzen'); }
}

// ── Tabs ───────────────────────────────────────────────
function showTab(tab) {
  document.getElementById('tab-checkin').classList.toggle('active', tab === 'checkin');
  document.getElementById('tab-overview').classList.toggle('active', tab === 'overview');
  document.getElementById('page-checkin').classList.toggle('active', tab === 'checkin');
  document.getElementById('page-overview').classList.toggle('active', tab === 'overview');
  document.getElementById('footer-bar').classList.toggle('visible', tab === 'overview');
  if (tab !== 'overview' && editMode) { editMode = false; document.getElementById('edit-toggle').classList.remove('on'); }
  if (tab === 'overview') loadData();
}

// ── Location grid ──────────────────────────────────────
function buildLocGrid() {
  const grid = document.getElementById('loc-grid');
  LOCATIONS.forEach((name, i) => {
    if (i === DIVIDER_AFTER + 1) {
      grid.querySelectorAll('.loc-btn').forEach(b => {
        if (b.id === `lb-${DIVIDER_AFTER-1}` || b.id === `lb-${DIVIDER_AFTER}`) b.classList.add('before-divider');
      });
      const div = document.createElement('div');
      div.className = 'loc-divider';
      grid.appendChild(div);
    }
    const btn = document.createElement('button');
    btn.className = 'loc-btn'; btn.id = `lb-${i}`;
    const team = TEAMS[i];
    btn.innerHTML = team ? `${name}<br><span style="font-size:.85rem;color:var(--muted);font-weight:400;">${team}</span>` : name;
    if (i === DIVIDER_AFTER+1 || i === DIVIDER_AFTER+2) btn.classList.add('after-divider');
    btn.onclick = () => selectLoc(i);
    grid.appendChild(btn);
  });
}

function selectRole(role) {
  selectedRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.className = 'role-btn');
  document.querySelector(`[data-role="${role}"]`).classList.add(role==='UA'?'sel-ua':'sel-aa');
  if (selectedLoc !== null) paintLoc(selectedLoc);
  updateBtn();
}

function selectLoc(idx) {
  selectedLoc = idx;
  document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('sel-ua','sel-aa'));
  paintLoc(idx); updateBtn();
}

function paintLoc(idx) {
  const cls = selectedRole==='UA'?'sel-ua':selectedRole==='AA'?'sel-aa':'';
  const btn = document.getElementById(`lb-${idx}`);
  if (btn) { btn.classList.remove('sel-ua','sel-aa'); if (cls) btn.classList.add(cls); }
}

function updateBtn() {
  if (hasCheckedIn) return;
  const name = document.getElementById('name-input').value.trim();
  const btn  = document.getElementById('submit-btn');
  const ok   = !!(name && selectedRole && selectedLoc !== null);
  btn.disabled = !ok;
  btn.classList.toggle('ready', ok);
  if (ok) btn.classList.toggle('aa', selectedRole==='AA');
  else btn.classList.remove('aa');
  btn.textContent = ok
    ? `Check-in: ${selectedRole==='UA'?'UA/UÄ':'AA/AÄ'} — ${LOCATIONS[selectedLoc]}`
    : 'Check-in';
}

// ── Submit ─────────────────────────────────────────────
async function submitCheckin() {
  if (hasCheckedIn) return;
  const name = document.getElementById('name-input').value.trim();
  if (!name || selectedRole === null || selectedLoc === null) return;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Speichern…';
  localStorage.setItem('checkin_name', name);

  try {
    const entry = { name, role: selectedRole, loc: selectedLoc, ts: Date.now() };

    // Write only this user's entry — no race condition
    const res = await fetch(`${FIREBASE_URL}/checkin/entries/${myId}.json`, {
      method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(entry),
    });
    if (!res.ok) throw new Error(await res.text());

    // Set lastReset
    await fetch(`${FIREBASE_URL}/checkin/lastReset.json`, {
      method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(todayStr()),
    });

    // Update local state immediately for instant display
    if (!currentData) currentData = emptyData();
    if (!currentData.entries) currentData.entries = {};
    currentData.entries[myId] = entry;
    renderOverview();
    // Also reload from Firebase after short delay to confirm sync
    setTimeout(loadData, 1000);

    hasCheckedIn = true;
    btn.disabled = true;
    btn.classList.remove('ready','aa');
    btn.classList.add('done');
    btn.innerHTML = '<span class="circle-check">&#10003;</span>';
    document.getElementById('status-msg').textContent = '';
  } catch(e) {
    console.error('submit:', e);
    document.getElementById('status-msg').textContent = 'Fehler – bitte nochmal versuchen';
  } finally {
    if (!hasCheckedIn) { btn.disabled = false; updateBtn(); }
  }
}


// ── Edit / drag-drop mode ──────────────────────────────
let editMode = false;

function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('edit-toggle');
  btn.classList.toggle('on', editMode);
  
  document.getElementById('ov-cols').classList.toggle('edit-mode', editMode);
  renderOverview(); // re-render with/without drag handles
}

async function moveEntry(uid, newLoc) {
  const entry = currentData?.entries?.[uid];
  if (!entry || entry.loc === newLoc) return;
  const oldLoc = entry.loc;
  try {
    const updated = { ...entry, loc: newLoc };
    const res = await fetch(`${FIREBASE_URL}/checkin/entries/${uid}.json`, {
      method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(updated),
    });
    if (!res.ok) throw new Error(await res.text());
    currentData.entries[uid] = updated;
    renderOverview();
    logChange(entry.role, oldLoc, newLoc);
  } catch(err) { console.error('move failed:', err); alert('Fehler beim Verschieben'); }
}

function initDragDrop() {
  if (!editMode) return;
  document.getElementById('ov-cols').classList.add('edit-mode');

  // ── MOUSE drag-and-drop ─────────────────────────────
  document.querySelectorAll('.ov-name[data-uid]').forEach(chip => {
    chip.draggable = true;
    chip.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', chip.dataset.uid);
      e.dataTransfer.effectAllowed = 'move';
      chip.classList.add('dragging');
    });
    chip.addEventListener('dragend', () => {
      chip.classList.remove('dragging');
      document.querySelectorAll('.ov-col').forEach(c => c.classList.remove('drag-over'));
    });
  });

  document.querySelectorAll('.ov-col[data-loc]').forEach(col => {
    col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave', e => { if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over'); });
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over');
      moveEntry(e.dataTransfer.getData('text/plain'), parseInt(col.dataset.loc));
    });
  });

  // ── TOUCH drag-and-drop ─────────────────────────────
  let touchUid = null, touchClone = null;

  document.querySelectorAll('.ov-name[data-uid]').forEach(chip => {
    chip.addEventListener('touchstart', e => {
      if (!editMode) return;
      touchUid = chip.dataset.uid;
      const rect = chip.getBoundingClientRect();
      // Create visible clone following finger
      touchClone = chip.cloneNode(true);
      touchClone.style.cssText = `position:fixed;z-index:9999;pointer-events:none;
        width:${rect.width}px;opacity:.85;border-radius:6px;
        left:${rect.left}px;top:${rect.top}px;`;
      document.body.appendChild(touchClone);
      chip.classList.add('dragging');
    }, { passive: true });

    chip.addEventListener('touchmove', e => {
      if (!touchClone) return;
      e.preventDefault();
      const t = e.touches[0];
      touchClone.style.left = (t.clientX - touchClone.offsetWidth/2) + 'px';
      touchClone.style.top  = (t.clientY - touchClone.offsetHeight/2) + 'px';
      // Highlight col under finger
      touchClone.style.display = 'none';
      const el = document.elementFromPoint(t.clientX, t.clientY);
      touchClone.style.display = '';
      document.querySelectorAll('.ov-col').forEach(c => c.classList.remove('drag-over'));
      const col = el?.closest('.ov-col[data-loc]');
      if (col) col.classList.add('drag-over');
    }, { passive: false });

    chip.addEventListener('touchend', e => {
      if (!touchClone || !touchUid) return;
      const t = e.changedTouches[0];
      touchClone.remove(); touchClone = null;
      document.querySelectorAll('.ov-col').forEach(c => c.classList.remove('drag-over'));
      document.querySelectorAll('.ov-name').forEach(c => c.classList.remove('dragging'));
      // Find col under finger
      const el = document.elementFromPoint(t.clientX, t.clientY);
      const col = el?.closest('.ov-col[data-loc]');
      if (col) moveEntry(touchUid, parseInt(col.dataset.loc));
      touchUid = null;
    });
  });
}

// ── Render overview ────────────────────────────────────
function renderOverview() {
  const wrap = document.getElementById('ov-cols');
  wrap.innerHTML = '';
  const buckets = LOCATIONS.map(()=>[]);
  const entries = currentData?.entries || {};
  Object.entries(entries).forEach(([uid, e]) => {
    if (e && e.loc >= 0 && e.loc < LOCATIONS.length)
      buckets[e.loc].push({ name: e.name, role: e.role, isMe: uid === myId, uid });
  });
  LOCATIONS.forEach((locName, i) => {
    if (i === DIVIDER_AFTER + 1) {
      const div = document.createElement('div');
      div.className = 'ov-col-divider';
      wrap.appendChild(div);
    }
    const members = buckets[i];
    const col = document.createElement('div');
    col.className = 'ov-col';
    col.dataset.loc = i;
    col.innerHTML = `
      <div class="ov-col-head">${locName}${TEAMS[i] ? '<br><span class="ov-col-team">' + TEAMS[i] + '</span>' : ''}</div>
      <div class="ov-names">
        ${members.length === 0
          ? '<div class="ov-empty">—</div>'
          : members.map(m=>`<div class="ov-name ${m.role.toLowerCase()}${m.isMe?' me':''}" data-uid="${m.uid}" title="${m.name}">${m.name}</div>`).join('')}
      </div>`;
    wrap.appendChild(col);
  });
  // Init drag-drop if edit mode active
  if (editMode) initDragDrop();
}

// ── Changelog (track all moves to Firebase) ───────────
function getLocName(locIndex) {
  const d = new Date();
  const day = d.getDay();
  const ss = SS_NAMES[day] || SS_NAMES[1];
  const locs = ['Saal 11','Saal 13','Saal 14','Saal 15','Saal 16','Saal 3/19/20', ss[0], ss[1]];
  return locs[locIndex] || `Ort ${locIndex}`;
}

async function logChange(role, fromLoc, toLoc) {
  const now = new Date();
  const hhmm = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const entry = {
    role,
    fromLoc,
    toLoc,
    fromName: getLocName(fromLoc),
    toName: getLocName(toLoc),
    fromTeam: getTeamForLoc(fromLoc, now.getDay()),
    toTeam: getTeamForLoc(toLoc, now.getDay()),
    time: hhmm,
    ts: Date.now()
  };
  try {
    await fetch(`${FIREBASE_URL}/changelog/${todayStr()}.json`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(entry),
    });
  } catch(e) { console.error('logChange:', e); }
}

// ── Analytics password ─────────────────────────────────
function openAnalyticsPw() {
  document.getElementById('ana-pw-field').value = '';
  document.getElementById('ana-pw-error').textContent = '';
  document.getElementById('ana-pw-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('ana-pw-field').focus(), 100);
}
function closeAnalyticsPw() {
  document.getElementById('ana-pw-overlay').style.display = 'none';
}
function confirmAnalyticsPw() {
  if (document.getElementById('ana-pw-field').value !== '1234') {
    document.getElementById('ana-pw-error').textContent = 'Falsches Passwort';
    document.getElementById('ana-pw-field').value = '';
    document.getElementById('ana-pw-field').focus();
    return;
  }
  closeAnalyticsPw();
  openAnalytics();
}

// ── Analytics overlay ──────────────────────────────────
let anaSelectedDays = new Set();
let anaSelectedRoles = new Set();
let anaSelectedLocs = new Set();

function buildAnalyticsFilters() {
  // Day buttons
  const daysWrap = document.getElementById('ana-days');
  const dayLabels = ['Mo','Di','Mi','Do','Fr','Sa','So'];
  const dayNums = [1,2,3,4,5,6,0];
  dayLabels.forEach((label, i) => {
    const btn = document.createElement('button');
    btn.className = 'ana-day-btn';
    btn.textContent = label;
    btn.dataset.day = dayNums[i];
    btn.onclick = () => {
      btn.classList.toggle('active');
      const d = parseInt(btn.dataset.day);
      if (anaSelectedDays.has(d)) anaSelectedDays.delete(d); else anaSelectedDays.add(d);
      loadAnalytics();
    };
    daysWrap.appendChild(btn);
  });

  // Role buttons
  const rolesWrap = document.getElementById('ana-roles');
  ['UA','AA'].forEach(role => {
    const btn = document.createElement('button');
    btn.className = 'ana-filter-btn';
    btn.textContent = role === 'UA' ? 'UA / UÄ' : 'AA / AÄ';
    btn.dataset.role = role;
    btn.onclick = () => {
      btn.classList.toggle(role === 'UA' ? 'active' : 'active-aa');
      if (anaSelectedRoles.has(role)) anaSelectedRoles.delete(role); else anaSelectedRoles.add(role);
      loadAnalytics();
    };
    rolesWrap.appendChild(btn);
  });

  // Location buttons
  const locsWrap = document.getElementById('ana-locs');
  ALL_LOC_NAMES.forEach(loc => {
    const btn = document.createElement('button');
    btn.className = 'ana-filter-btn';
    btn.textContent = loc;
    btn.dataset.loc = loc;
    btn.onclick = () => {
      btn.classList.toggle('active');
      if (anaSelectedLocs.has(loc)) anaSelectedLocs.delete(loc); else anaSelectedLocs.add(loc);
      loadAnalytics();
    };
    locsWrap.appendChild(btn);
  });
}

function openAnalytics() {
  const to = new Date();
  const from = new Date();
  from.setMonth(from.getMonth() - 1);
  document.getElementById('ana-from').value = from.toISOString().slice(0,10);
  document.getElementById('ana-to').value = to.toISOString().slice(0,10);
  document.getElementById('ana-from').onchange = loadAnalytics;
  document.getElementById('ana-to').onchange = loadAnalytics;
  document.getElementById('ana-time-from').onchange = loadAnalytics;
  document.getElementById('ana-time-to').onchange = loadAnalytics;
  document.getElementById('analytics-overlay').classList.add('visible');
  loadAnalytics();
}

function closeAnalytics() {
  document.getElementById('analytics-overlay').classList.remove('visible');
}

function timeToMinutes(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}

// Store raw time-filtered entries (no day/role/loc filter) for detail breakdowns
let anaRawEntries = [];
const DAY_LABELS_DE = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const DAY_ORDER = [1,2,3,4,5,6,0]; // Mo-So

function buildWeekdayDetail(matchFn, roleClass) {
  // Count per weekday from raw entries (only date+time filtered)
  const dayCounts = {};
  anaRawEntries.forEach(e => {
    if (matchFn(e)) {
      dayCounts[e.weekday] = (dayCounts[e.weekday] || 0) + 1;
    }
  });
  const maxDay = Math.max(...Object.values(dayCounts), 1);
  // Sort by count descending
  const sorted = DAY_ORDER
    .filter(d => (dayCounts[d] || 0) > 0)
    .sort((a, b) => (dayCounts[b] || 0) - (dayCounts[a] || 0));
  if (sorted.length === 0) return '<div style="font-size:.75rem;color:var(--muted);padding:.3rem 0;">Keine Daten</div>';
  let h = '';
  sorted.forEach(d => {
    const count = dayCounts[d] || 0;
    const pct = Math.round((count / maxDay) * 100);
    const rc = roleClass || 'ua';
    h += `<div class="ana-detail-row">
      <div class="ana-detail-day">${DAY_LABELS_DE[d]}</div>
      <div class="ana-detail-track"><div class="ana-detail-fill ${rc}" style="width:${pct}%"><span class="ana-detail-count">${count}×</span></div></div>
    </div>`;
  });
  return h;
}

let anaSelectedSnapshot = null;

function toggleSnapshot(loc) {
  const detailEl = document.getElementById('ana-snapshot-detail');
  const blocks = document.querySelectorAll('.ana-snapshot-block');

  // Toggle off if already selected
  if (anaSelectedSnapshot === loc) {
    anaSelectedSnapshot = null;
    blocks.forEach(b => b.classList.remove('selected'));
    detailEl.classList.remove('visible');
    detailEl.innerHTML = '';
    return;
  }

  anaSelectedSnapshot = loc;
  blocks.forEach(b => b.classList.toggle('selected', b.dataset.loc === loc));

  // Build weekday breakdown from raw entries (only date+time filter)
  const detail = buildWeekdayDetail(
    e => e.fromName === loc || e.toName === loc, 'ua'
  );

  // Also show direction per weekday
  const dayIn = {}, dayOut = {};
  anaRawEntries.forEach(e => {
    if (e.toName === loc) dayIn[e.weekday] = (dayIn[e.weekday] || 0) + 1;
    if (e.fromName === loc) dayOut[e.weekday] = (dayOut[e.weekday] || 0) + 1;
  });

  let dirHtml = '<div style="margin-top:.5rem;">';
  DAY_ORDER.forEach(d => {
    const inC = dayIn[d] || 0;
    const outC = dayOut[d] || 0;
    if (inC === 0 && outC === 0) return;
    dirHtml += `<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.2rem;font-size:.7rem;">
      <div style="width:28px;text-align:right;color:var(--muted);">${DAY_LABELS_DE[d]}</div>
      <span style="color:#f87171;">+${inC}</span>
      <span style="color:#c084fc;">−${outC}</span>
      <span style="color:var(--muted);">netto: ${inC - outC > 0 ? '+' : ''}${inC - outC}</span>
    </div>`;
  });
  dirHtml += '</div>';

  detailEl.innerHTML = `<div class="ana-snapshot-detail-title">${loc} — Wochentag-Verteilung</div>${detail}${dirHtml}`;
  detailEl.classList.add('visible');
}

function toggleBarDetail(el) {
  el.closest('.ana-bar-wrap').classList.toggle('open');
}

async function loadAnalytics() {
  const fromStr = document.getElementById('ana-from').value;
  const toStr = document.getElementById('ana-to').value;
  const timeFrom = document.getElementById('ana-time-from').value;
  const timeTo = document.getElementById('ana-time-to').value;
  if (!fromStr || !toStr) return;

  const statusEl = document.getElementById('ana-status');
  const chartsEl = document.getElementById('ana-charts');
  statusEl.textContent = 'Lade Daten…';
  chartsEl.innerHTML = '';

  try {
    const url = `${FIREBASE_URL}/changelog.json?orderBy="$key"&startAt="${fromStr}"&endAt="${toStr}\uf8ff"&t=${Date.now()}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    if (!data) {
      statusEl.textContent = '';
      chartsEl.innerHTML = '<div class="ana-empty">Keine Daten im gewählten Zeitraum.</div>';
      return;
    }

    const tFromMin = timeFrom ? timeToMinutes(timeFrom) : 0;
    const tToMin = timeTo ? timeToMinutes(timeTo) : 1440;

    // Build raw entries: only date range + time filter (for detail breakdowns)
    anaRawEntries = [];
    const allEntries = [];
    let totalDays = 0;
    const seenDays = new Set();

    Object.entries(data).forEach(([dateKey, dayEntries]) => {
      const d = new Date(dateKey + 'T12:00:00');
      const weekday = d.getDay();
      if (!dayEntries) return;

      Object.values(dayEntries).forEach(entry => {
        // Time filter applies to both raw and filtered
        if (entry.time) {
          const entryMin = timeToMinutes(entry.time);
          if (entryMin < tFromMin || entryMin > tToMin) return;
        }
        const enriched = { ...entry, date: dateKey, weekday };
        anaRawEntries.push(enriched);

        // Apply additional filters for display
        if (anaSelectedDays.size > 0 && !anaSelectedDays.has(weekday)) return;
        if (anaSelectedRoles.size > 0 && !anaSelectedRoles.has(entry.role)) return;
        if (anaSelectedLocs.size > 0 && !anaSelectedLocs.has(entry.fromName) && !anaSelectedLocs.has(entry.toName)) return;
        allEntries.push(enriched);
        seenDays.add(dateKey);
      });
    });
    totalDays = seenDays.size;

    if (allEntries.length === 0) {
      statusEl.textContent = '';
      chartsEl.innerHTML = '<div class="ana-empty">Keine Änderungen für diese Filter.</div>';
      return;
    }

    statusEl.textContent = `${allEntries.length} Änderungen an ${totalDays} Tagen`;

    // ── Snapshot heatmap ────────────────────────────────
    const locChanges = {};
    const locNet = {}; // positive = gains people, negative = loses people
    allEntries.forEach(e => {
      locChanges[e.fromName] = (locChanges[e.fromName] || 0) + 1;
      locChanges[e.toName] = (locChanges[e.toName] || 0) + 1;
      locNet[e.toName] = (locNet[e.toName] || 0) + 1;
      locNet[e.fromName] = (locNet[e.fromName] || 0) - 1;
    });
    const maxLocChanges = Math.max(...Object.values(locChanges), 1);

    let html = '<div class="ana-snapshot">';
    html += '<div class="ana-snapshot-title">Planungsqualität pro Ort</div>';
    html += '<div class="ana-snapshot-legend">';
    html += '<div class="ana-snapshot-legend-item"><div class="ana-snapshot-legend-dot" style="background:hsla(0,70%,45%,.4)"></div>Unterplant</div>';
    html += '<div class="ana-snapshot-legend-item"><div class="ana-snapshot-legend-dot" style="background:hsla(120,70%,45%,.4)"></div>Richtig geplant</div>';
    html += '<div class="ana-snapshot-legend-item"><div class="ana-snapshot-legend-dot" style="background:hsla(50,70%,45%,.4)"></div>Überplant</div>';
    html += '<div class="ana-snapshot-legend-item" style="margin-left:.5rem;">+ = Person hinzugefügt</div>';
    html += '<div class="ana-snapshot-legend-item">− = Person entfernt</div>';
    html += '</div>';
    html += '<div class="ana-snapshot-grid">';

    // Count per room: how many times someone was added (+) vs removed (-)
    const locAdded = {}, locRemoved = {};
    // Collect teams seen per room from changelog entries
    const locTeamsSeen = {};
    allEntries.forEach(e => {
      locAdded[e.toName] = (locAdded[e.toName] || 0) + 1;
      locRemoved[e.fromName] = (locRemoved[e.fromName] || 0) + 1;
      // Track teams from changelog (if available) or resolve from weekday
      const ft = e.fromTeam || getTeamForLoc(e.fromLoc, e.weekday);
      const tt = e.toTeam || getTeamForLoc(e.toLoc, e.weekday);
      if (ft) { if (!locTeamsSeen[e.fromName]) locTeamsSeen[e.fromName] = {}; locTeamsSeen[e.fromName][ft] = (locTeamsSeen[e.fromName][ft]||0)+1; }
      if (tt) { if (!locTeamsSeen[e.toName]) locTeamsSeen[e.toName] = {}; locTeamsSeen[e.toName][tt] = (locTeamsSeen[e.toName][tt]||0)+1; }
    });

    const allRooms = [...new Set([...ALL_LOC_NAMES, ...Object.keys(locChanges)])];
    allRooms.forEach(loc => {
      const added = locAdded[loc] || 0;
      const removed = locRemoved[loc] || 0;
      const total = added + removed;
      // Color: mostly added → red, mostly removed → yellow, balanced/none → green
      let hue = 120; // green default
      if (total > 0) {
        const addRatio = added / total;
        const removeRatio = removed / total;
        if (addRatio > removeRatio) {
          hue = Math.max(0, 120 - ((addRatio - 0.5) * 2) * 120);
        } else if (removeRatio > addRatio) {
          hue = Math.max(50, 120 - ((removeRatio - 0.5) * 2) * 70);
        }
      }
      const bg = total > 0 ? `hsla(${hue},70%,45%,.4)` : 'rgba(255,255,255,.05)';
      // Show teams that used this room (sorted by frequency)
      const teamsObj = locTeamsSeen[loc] || {};
      const teamsList = Object.entries(teamsObj).sort((a,b) => b[1]-a[1]).map(([t]) => t);
      const teamLabel = teamsList.length > 0 ? teamsList.join(', ') : '';
      html += `<div class="ana-snapshot-block" style="background:${bg}" onclick="toggleSnapshot('${loc.replace(/'/g,"\\'")}')" data-loc="${loc}">
        <div class="ana-snapshot-block-name">${loc}</div>
        ${teamLabel ? '<div style="font-size:.7rem;color:rgba(255,255,255,.5);margin-bottom:.15rem;">' + teamLabel + '</div>' : ''}
        <div class="ana-snapshot-block-info">
          <span style="color:#f87171;">+${added}</span> <span style="color:#c084fc;">−${removed}</span>
        </div>
      </div>`;
    });
    html += '</div>';
    html += '<div class="ana-snapshot-detail" id="ana-snapshot-detail"></div>';
    html += '</div>';

    // Helper: find most common team for a room from entries
    function resolveTeam(locName, entries) {
      const tc = {};
      entries.forEach(e => {
        if (e.fromName === locName) { const t = e.fromTeam || getTeamForLoc(e.fromLoc, e.weekday); if (t) tc[t] = (tc[t]||0)+1; }
        if (e.toName === locName) { const t = e.toTeam || getTeamForLoc(e.toLoc, e.weekday); if (t) tc[t] = (tc[t]||0)+1; }
      });
      const top = Object.entries(tc).sort((a,b) => b[1]-a[1]);
      return top.length > 0 ? top.map(([t]) => t).join('/') : '';
    }
    function locLabel(name) {
      const t = resolveTeam(name, allEntries);
      return t ? `${name} (${t})` : name;
    }

    // Chart 1: Most frequent moves — grouped by from→to pair
    const moveCounts = {};
    allEntries.forEach(e => {
      const key = `${e.role}|${e.fromName}|${e.toName}`;
      moveCounts[key] = (moveCounts[key] || 0) + 1;
    });
    const moveItems = Object.entries(moveCounts)
      .map(([key, count]) => { const [role, from, to] = key.split('|'); return { role, from, to, count }; });

    // Group by from→to pair, sort groups by total count desc
    const pairGroups = {};
    moveItems.forEach(item => {
      const pairKey = `${item.from}|${item.to}`;
      if (!pairGroups[pairKey]) pairGroups[pairKey] = { from: item.from, to: item.to, items: [], total: 0 };
      pairGroups[pairKey].items.push(item);
      pairGroups[pairKey].total += item.count;
    });
    const sortedGroups = Object.values(pairGroups).sort((a, b) => b.total - a.total);
    // Sort items within each group by count desc
    sortedGroups.forEach(g => g.items.sort((a, b) => b.count - a.count));

    const maxCount = Math.max(...moveItems.map(m => m.count), 1);

    html += '<div class="ana-chart-group"><div class="ana-chart-title">Häufigste Verschiebungen</div>';
    sortedGroups.forEach((group, gi) => {
      if (gi > 0) html += '<div style="height:.7rem;"></div>'; // gap between groups
      group.items.forEach(item => {
        const pct = Math.round((item.count / maxCount) * 100);
        const rc = item.role === 'UA' ? 'ua' : 'aa';
        const rl = item.role === 'UA' ? 'UA/UÄ' : 'AA/AÄ';
        const detail = buildWeekdayDetail(
          e => e.role === item.role && e.fromName === item.from && e.toName === item.to, rc
        );
        html += `<div class="ana-bar-wrap">
          <div class="ana-bar-row" onclick="toggleBarDetail(this)">
            <span class="ana-expand-arrow">▶</span>
            <div class="ana-bar-label">${rl}: ${locLabel(item.from)} → ${locLabel(item.to)}</div>
            <div class="ana-bar-track"><div class="ana-bar-fill ${rc}" style="width:${pct}%"><span class="ana-bar-count">${item.count}×</span></div></div>
          </div>
          <div class="ana-detail">${detail}</div>
        </div>`;
      });
    });
    html += '</div>';

    // Chart 2: Changes FROM location
    const fromCounts = {};
    allEntries.forEach(e => { fromCounts[e.fromName] = (fromCounts[e.fromName] || 0) + 1; });
    const sortedFrom = Object.entries(fromCounts).sort((a,b) => b[1] - a[1]);
    const maxFrom = sortedFrom[0]?.[1] || 1;
    html += '<div class="ana-chart-group"><div class="ana-chart-title">Verschiebungen von Ort (Quelle)</div>';
    sortedFrom.forEach(([loc, count]) => {
      const pct = Math.round((count / maxFrom) * 100);
      const detail = buildWeekdayDetail(e => e.fromName === loc, 'ua');
      html += `<div class="ana-bar-wrap">
        <div class="ana-bar-row" onclick="toggleBarDetail(this)">
          <span class="ana-expand-arrow">▶</span>
          <div class="ana-bar-label">${locLabel(loc)}</div>
          <div class="ana-bar-track"><div class="ana-bar-fill ua" style="width:${pct}%"><span class="ana-bar-count">${count}×</span></div></div>
        </div>
        <div class="ana-detail">${detail}</div>
      </div>`;
    });
    html += '</div>';

    // Chart 3: Changes TO location
    const toCounts = {};
    allEntries.forEach(e => { toCounts[e.toName] = (toCounts[e.toName] || 0) + 1; });
    const sortedTo = Object.entries(toCounts).sort((a,b) => b[1] - a[1]);
    const maxTo = sortedTo[0]?.[1] || 1;
    html += '<div class="ana-chart-group"><div class="ana-chart-title">Verschiebungen nach Ort (Ziel)</div>';
    sortedTo.forEach(([loc, count]) => {
      const pct = Math.round((count / maxTo) * 100);
      const detail = buildWeekdayDetail(e => e.toName === loc, 'aa');
      html += `<div class="ana-bar-wrap">
        <div class="ana-bar-row" onclick="toggleBarDetail(this)">
          <span class="ana-expand-arrow">▶</span>
          <div class="ana-bar-label">${locLabel(loc)}</div>
          <div class="ana-bar-track"><div class="ana-bar-fill aa" style="width:${pct}%"><span class="ana-bar-count">${count}×</span></div></div>
        </div>
        <div class="ana-detail">${detail}</div>
      </div>`;
    });
    html += '</div>';

    chartsEl.innerHTML = html;
  } catch(e) {
    console.error('loadAnalytics:', e);
    statusEl.textContent = 'Fehler beim Laden der Daten';
  }
}
</script>
